                <script>
            (function () {
                var repoName = 'BradEngine_Public';
                var href = window.location.href.replace(/\\/g, '/');
                var marker = '/' + repoName + '/';
                var markerIndex = href.toLowerCase().indexOf(marker.toLowerCase());
                var root = markerIndex >= 0 ? href.slice(0, markerIndex + marker.length) : window.location.origin + '/';

                window.bradAsset = function (path) {
                    return new URL(path, root).href;
                };

                window.bradLoadScript = function (path) {
                    document.write('<script src="' + window.bradAsset(path) + '"><\/script>');
                };

                window.bradLoadStyle = function (path) {
                    document.write('<link rel="stylesheet" href="' + window.bradAsset(path) + '">');
                };
            }());
        </script>
